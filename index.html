<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Support Portal | AI Automation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Smart Support Portal</h1>
            <p>Triagem inteligente e automação de chamados internos integrada à Inteligência Artificial.</p>
        </header>
        <main>
            <form id="form-chamado">
                <div class="form-group">
                    <label for="nome">Seu Nome Completo:</label>
                    <input type="text" id="nome" required placeholder="Ex: Paulo Marques">
                </div>

                <div class="form-group">
                    <label for="email">E-mail Corporativo:</label>
                    <input type="email" id="email" required placeholder="Ex: paulo.marques@empresa.com">
                </div>

                <div class="form-group">
                    <label for="descricao">Descreva o problema com detalhes:</label>
                    <textarea id="descricao" rows="5" required placeholder="Ex: Meu monitor principal parou de dar vídeo após a queda de energia de ontem..."></textarea>
                </div>

                <button type="submit" id="btn-enviar">Abrir Chamado Técnico</button>
            </form>

            <div id="mensagem-status" class="hidden"></div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
