services:
  - type: web
    name: n8n-suporte
    image:
      url: docker.io/n8nio/n8n:latest
    plan: free
    envVars:
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_USER_MANAGEMENT_DISABLED
        value: "false"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=256"
      - key: N8N_DIAGNOSTICS_ENABLED
        value: "false"
      - key: PORT
        value: "5678"
